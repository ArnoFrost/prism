name: CI

# Phase H-2 P1 B0 — Prism SDK 持续集成闸门：
#   1. uv 已装（astral-sh/setup-uv）
#   2. bin/* 可执行 + bin/prism --version 启动正常（doctor --scope ci）
#   3. skills frontmatter 合规（doctor --scope ci 内含 skill 阶段）
#   4. pytest tests/ + skills/workflow/shared/tests/ 全绿
#      （含 setup smoke + sniff + relink + validate_product + cli_contract_sync
#       + prism_cli + outer_schema + changelog_scan + index_update + sniff_lib
#       + check_skill_deprecation 等 shared 回归，覆盖所有防漂移闸门）
# 双 runner（macos-latest + ubuntu-latest）覆盖分发用户主流 OS。
# 不依赖 prism.local.yaml / vault / ~/.local/bin（doctor --scope ci 自包含）。
#
# 来源：029/r05 AP-2 P0（v1.1.5 收口节奏）—— 修复 v1.0→v1.1 CI 闸门漏跑
# 79% 测试（32/151 → 全量）的系统性退化。

on:
  push:
    branches: [main, mini, "release/**"]
  pull_request:
    branches: [main, mini]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: doctor + pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          # 本仓 SDK 是脚本集合，无 uv.lock / pyproject.toml；显式置空避免 v3 的
          # "No file matched [**/uv.lock]" fail（v5+ 仅 warn，但仍主动消除噪声）
          cache-dependency-glob: ""

      - name: Install Python via uv
        run: uv python install 3.11

      - name: Show toolchain
        run: |
          uv --version
          uv run python --version
          bin/prism --version || true

      - name: Doctor — scope ci (self-contained health gate)
        run: |
          bin/doctor --scope ci --json | tee doctor-ci.json
          bin/doctor --scope ci

      - name: pytest — SDK smoke + relink + sniff + workflow shared tests
        run: |
          uv run --with pytest python -m pytest tests/ skills/workflow/shared/tests/ -q

      - name: Validate workflow skills
        run: |
          bin/validate-skills --json | tee validate-skills.json

      - name: Upload doctor / validate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prism-ci-${{ matrix.os }}
          path: |
            doctor-ci.json
            validate-skills.json
          if-no-files-found: ignore
          retention-days: 14
