name: CI

# Phase H-2 P1 B0 — Prism SDK 持续集成闸门：
#   1. uv 已装（astral-sh/setup-uv）
#   2. bin/* 可执行 + bin/prism --version 启动正常（doctor --scope ci）
#   3. skills frontmatter 合规（doctor --scope ci 内含 skill 阶段）
#   4. pytest tests/ + skills/workflow/shared/tests/ 全绿
#      （含 setup smoke + sniff + relink + validate_product + cli_contract_sync
#       + prism_cli + outer_schema + changelog_scan + index_update + sniff_lib
#       + check_skill_deprecation 等 shared 回归，覆盖所有防漂移闸门）
#   5. release gate：BREAKING 变更必须同步 CHANGELOG.md + docs/migration.md
# 双 runner（macos-latest + ubuntu-latest）覆盖分发用户主流 OS。
# 不依赖 prism.local.yaml / vault / ~/.local/bin（doctor --scope ci 自包含）。
#
# 来源：029/r05 AP-2 P0（v1.1.5 收口节奏）—— 修复 v1.0→v1.1 CI 闸门漏跑
# 79% 测试（32/151 → 全量）的系统性退化。
#
# 维护：029/d09 AP-65（2026-05-13）— Node.js 20 deprecation 提前消化
#   - setup-uv: v5 → v7（v7.0.0 2025-10-07，Node 24 默认）
#   - upload-artifact: v4 → v6（v6.0.0 2025-12-12，Node 24 默认）
#   - checkout: 保持 v5（v5.0.0 2025-08-11 已 Node 24）
# 应对 2026-06-02 GitHub runner 强制 Node 24，秋季彻底移除 Node 20。

on:
  push:
    branches: [main, mini, "release/**"]
  pull_request:
    branches: [main, mini]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: doctor + pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # release_gate 需要 git diff base..head；默认 fetch-depth: 1（shallow clone）
          # 会让 push 事件的 `before` SHA 在本地不可达 → release_gate 报 `bad object`
          # 让 step 真红。本仓 172 commits / 8.5MB，fetch-depth: 0 无性能代价。
          fetch-depth: 0

      - name: Setup uv
        # 029/d09 AP-65 — 升级到 v7（2025-10-07）以默认 Node.js 24，
        # 应对 2026-06-02 Node.js 20 deprecated 截止；v6 仍 Node 20，必须 v7。
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # 本仓 SDK 是脚本集合，无 uv.lock / pyproject.toml；显式置空避免 v3 的
          # "No file matched [**/uv.lock]" fail（v5+ 仅 warn，但仍主动消除噪声）
          cache-dependency-glob: ""

      - name: Install Python via uv
        run: uv python install 3.11

      - name: Show toolchain
        run: |
          uv --version
          uv run python --version
          bin/prism --version || true

      - name: Doctor — scope ci (self-contained health gate)
        run: |
          bin/doctor --scope ci --json | tee doctor-ci.json
          bin/doctor --scope ci

      - name: pytest — SDK smoke + relink + sniff + workflow shared tests
        run: |
          uv run --with pytest python -m pytest tests/ skills/workflow/shared/tests/ -q

      - name: Release gate — breaking docs sync
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        # 显式 shell: bash 启用 pipefail（GHA 默认 `bash -e {0}` 不带 pipefail），
        # 否则 `release_gate.py … | tee` 中上游脚本非零退出会被 `tee` 吞成功，
        # 导致 breaking 提交可在无文档同步的情况下静默合入。来源：r02 F-P0-1。
        shell: bash
        run: |
          uv run python skills/workflow/shared/scripts/release_gate.py \
            --repo . \
            --base "$PR_BASE_SHA" \
            --head "$PR_HEAD_SHA" \
            --json | tee release-gate.json

      - name: Validate workflow skills
        run: |
          bin/validate-skills --json | tee validate-skills.json

      - name: Upload doctor / validate artifacts
        if: always()
        # 029/d09 AP-65 — 升级到 v6（2025-12-12）以默认 Node.js 24；v5 仅 preliminary
        # support、仍按 Node 20 运行，必须 v6 才能消除 Node 20 deprecated 告警。
        # 要求 runner ≥ 2.327.1（GitHub-hosted 自动满足）。
        uses: actions/upload-artifact@v6
        with:
          name: prism-ci-${{ matrix.os }}
          path: |
            doctor-ci.json
            release-gate.json
            validate-skills.json
          if-no-files-found: ignore
          retention-days: 14
