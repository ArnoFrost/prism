# Prism Skills Catalog (SSOT)
# Public injected skills must be declared here.

version: "1.0.0"

policy:
  default_visibility: internal
  default_stability: experimental
  public_requires_audit: true
  note: "Private skills are unrestricted. Public skills require universality and normative necessity."

# 版本策略（SSOT）
# ─────────────────────────────────────────────
# public  → prism-* 前缀，对外暴露，version = 仓库 tag（如 0.5.0），repo bump 时统一 bump
# dev     → prism-* 前缀，不暴露，维护者内部工具，version = dev-NN，内部耦合演进
# common  → 无 prism-* 前缀，泛化技能，用户可自选装入，version = 独立 semver
# personal variant → dev-NN-{user}，基于 dev 方案加用户后缀
# 开源过渡 → v1.0.0 时 dev/common skill 如需 public 化，进入 catalog + 重置为 semver
versioning:
  public: "{repo_tag}"
  dev: "dev-{NN}"
  common: "independent semver"
  personal: "dev-{NN}-{user}"
  note: "NN starts at 01 per skill, increments on substantive change. Public versions bump atomically with repo tag."

# ─────────────────────────────────────────────
# Catalog entries（workspace-init 含原 prism-workspace-migrate 迁移能力；当前无单独 public skill）
# ─────────────────────────────────────────────
