# Prism Distribution Whitelist
# 控制 prism-dist 打包时包含哪些 skills
# 策略与机制分离：修改此文件即可调整分发范围，无需改脚本

version: "0.8.0"

profiles:
  mini:
    description: "mini 轻量分发 — SDK 内置 workflow/workspace 完整闭环，不要求外部 Skills"
    skills:
      - workspace-init             # [core] 项目初始化（含迁移）
      - workflow-intake            # [core] 入料路由
      - workflow-scope             # [core] 合同收敛
      - workflow-review            # [core] 多角色评审
      - workflow-review-lite       # [core] 轻量评审
      - workflow-tidy              # [core] 工件对齐
      - workflow-digest            # [core] 状态摘要
      - workflow-status            # [core] 健康状态
    include_shared: false

  full:
    description: "完整版 — mini core + 外部 common / devops 扩展"
    skills:
      - workspace-init             # [core] 项目初始化（含迁移）
      - workflow-intake            # [core] 入料路由
      - workflow-scope             # [core] 合同收敛
      - workflow-review            # [core] 多角色评审
      - workflow-review-lite       # [core] 轻量评审
      - workflow-tidy              # [core] 工件对齐
      - workflow-digest            # [core] 状态摘要
      - workflow-status            # [core] 健康状态
      - commit                     # [common]
      - digest                     # [common]
      - humanizer                  # [common]
      - learnnote                  # [common]
    include_shared: true

# 永远排除（dev 工具 + 个人固化版）
always_exclude:
  - prism-dist                     # [dev] 分发工具自身不入包
  - prism-push                     # [dev] 维护者工具
  - prism-pull                     # [dev] 维护者工具
  - prism-review-arno              # [personal]
  # - prism-workspace-init-arno    # [deprecated] 个人固化版已弃用
  - cursor-insights                # [dev] 内部分析工具
