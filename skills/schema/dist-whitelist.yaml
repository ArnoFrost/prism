# Prism Distribution Whitelist
# 控制 prism-dist 打包时包含哪些 skills
# 策略与机制分离：修改此文件即可调整分发范围，无需改脚本

version: "0.7.0"

profiles:
  mvp:
    description: "MVP 0.7.x 内部测试版 — workflow 核心 + common"
    skills:
      - prism-workflow-init        # [dev] 项目初始化
      - prism-workflow-review      # [dev] 多角色评审
      - commit                     # [common]
    include_shared: true

  full:
    description: "完整版 — workflow 全管线 + common"
    skills:
      - prism-workflow-init        # [dev] 项目初始化
      - prism-workflow-intake      # [dev] 入料路由
      - prism-workflow-scope       # [dev] 合同收敛
      - prism-workflow-review      # [dev] 多角色评审
      - prism-workflow-review-lite # [dev] 轻量评审
      - prism-workspace-migrate    # [public] 路径迁移
      - commit                     # [common]
      - digest                     # [common]
      - humanizer                  # [common]
      - learnnote                  # [common]
    include_shared: true

# 永远排除（dev 工具 + 个人固化版）
always_exclude:
  - prism-dist                     # [dev] 分发工具自身不入包
  - prism-push                     # [dev] 维护者工具
  - prism-pull                     # [dev] 维护者工具
  - aitask-to-prism                # [dev] 历史迁移工具
  - prism-review-arno              # [personal]
  - prism-workspace-init-arno      # [personal]
  - cursor-insights                # [dev] 内部分析工具
