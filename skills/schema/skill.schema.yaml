# Prism Skill Schema
# Defines the structure for skills in the Prism ecosystem.

version: "1.0.0"

# Skill directory structure
structure:
  required:
    - SKILL.md
  optional:
    - scripts/
    - references/
    - assets/
    - shared/

# SKILL.md frontmatter
frontmatter:
  required:
    name: "string, lowercase + hyphens, matches directory name"
    description: "string, includes 'Use when:' trigger phrases"
  optional:
    license: "string"
    compatibility: "string"
    metadata:
      author: "string"
      version: "string"

# Loading strategy (progressive)
loading:
  stages:
    - name: startup
      content: "name + description from frontmatter"
      budget: "~100 tokens"
    - name: activated
      content: "full SKILL.md"
      budget: "<5000 tokens"
    - name: on_demand
      content: "scripts/ references/ assets/"
      budget: "unlimited"

# Skill categories in Prism
categories:
  workspace:
    description: "Workspace lifecycle management"
    examples:
      - prism-workspace-init
  review:
    description: "Multi-perspective review capabilities"
    examples:
      - prism-review
  migration:
    description: "Path and workspace migration"
    examples:
      - prism-workspace-migrate
  utility:
    description: "General-purpose tools"
    examples:
      - commit
      - digest

# Distribution model (三正交分离)
distribution:
  system_layer: "prism/skills/schema/ + templates/ (SDK, schema + templates only)"
  skills_repo: "~/prism-skills/{skill-name}/SKILL.md (independent Git repo)"
  ide_integration:
    cursor: "~/.cursor/skills-cursor/{skill-name} -> ~/prism-skills/{skill-name}/"
    claude: "~/.claude/skills/{skill-name} -> ~/prism-skills/{skill-name}/"
  mechanism: "bin/relink reads prism.local.yaml skills_path, auto-creates symlinks"
