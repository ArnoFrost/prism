# Prism Skill Schema
# Defines the structure for skills in the Prism ecosystem.

version: "1.0.0"

# Skill directory structure
structure:
  required:
    - SKILL.md
  optional:
    - scripts/
    - references/
    - assets/
    - shared/

# SKILL.md frontmatter
frontmatter:
  spec: "skills/schema/frontmatter-spec.md — field tiers, order, catalog mirror rules"
  required:
    name: "string, lowercase + hyphens; MUST equal parent directory basename (distribution id)"
    description: "string, includes 'Use when:' trigger phrases"
    description_zh: "string, CodeBuddy IDE list label (required for SDK builtin workflow/workspace)"
  recommended_order:
    - name
    - description
    - description_zh
    - license
    - metadata
    - visibility
    - stability
    - user_invocable
    - public_gate

# Naming — 目录名 = frontmatter name = IDE 软链名（agentskills.io / Codex 兼容）
naming:
  rule: "basename(skill_dir) === frontmatter.name === relink link name"
  sdk_builtin:
    layout: "skills/{category}/{skill-id}/SKILL.md"
    skill_id: "{category}-{slug} — e.g. workflow-archive, workspace-init"
    anti_pattern: "skills/workflow/archive/ + name: workflow-archive（父目录与 name 不一致，Codex 等会报错）"
  external_skills:
    layout: "~/prism-skills/{skill-id}/SKILL.md"
    skill_id: "flat top-level directory name"
  slash_command: "/{skill-id} — 与 name 同形，如 /workflow-archive"
  optional:
    visibility: "enum: internal | public — SSOT 在 skills-catalog.yaml，缺省 = internal"
    stability: "enum: experimental | stable — SSOT 在 skills-catalog.yaml，缺省 = experimental"
    license: "string"
    compatibility: "string"
    public_gate:
      reviewed: "boolean, must be true when visibility=public"
      reviewed_by: "string, reviewer identity"
      reviewed_at: "string, ISO date"
      rationale: "string, why this should be public and universal"
      rollback: "string, rollback strategy summary"
      ssot_id: "string, id in skills/schema/skills-catalog.yaml"
    metadata:
      author: "string"
      version: "string"

# Governance: 私人能力默认内部；公开能力必须经审计后显式进入 SSOT
governance:
  defaults:
    visibility: "internal"
    stability: "experimental"
  public_publish_gate:
    rule: "Only audited skills can be public."
    required_when_public:
      - public_gate.reviewed=true
      - public_gate.reviewed_by
      - public_gate.reviewed_at
      - public_gate.rationale
      - public_gate.rollback
      - public_gate.ssot_id
  ssot:
    public_catalog: "skills/schema/skills-catalog.yaml"
    rule: "Public injected skills MUST exist in catalog entries."

# Loading strategy (progressive)
loading:
  stages:
    - name: startup
      content: "name + description from frontmatter"
      budget: "~100 tokens"
    - name: activated
      content: "full SKILL.md"
      budget: "<5000 tokens"
    - name: on_demand
      content: "scripts/ references/ assets/"
      budget: "unlimited"

# Skill categories in Prism
categories:
  workflow:
    description: "Workflow-oriented skills for structured task collaboration"
    examples:
      - workspace-init
      - workflow-intake
      - workflow-review
  migration:
    description: "Path and workspace migration"
    examples:
      - workspace-init
  utility:
    description: "General-purpose tools"
    examples:
      - commit
      - digest

# Distribution model (三正交分离)
distribution:
  system_layer: "prism/skills/schema/ + templates/ (SDK, schema + templates only)"
  skills_repo: "~/prism-skills/{skill-name}/SKILL.md (independent Git repo)"
  ide_integration:
    cursor: "~/.cursor/skills-cursor/{skill-name} -> ~/prism-skills/{skill-name}/"
    claude: "~/.claude/skills/{skill-name} -> ~/prism-skills/{skill-name}/"
    claude_internal: "~/.claude-internal/skills/{skill-name} -> ~/prism-skills/{skill-name}/"
    codex: "~/.codex/skills/{skill-name} -> ~/prism-skills/{skill-name}/"
    codebuddy: "~/.codebuddy/skills/{skill-name} -> ~/prism-skills/{skill-name}/"
    codebuddy_cli: "~/.codebuddy/commands/{skill-name} -> ~/prism-skills/{skill-name}/ (if directory exists)"
  mechanism: "bin/relink reads prism.local.yaml skills_path, auto-creates symlinks"
