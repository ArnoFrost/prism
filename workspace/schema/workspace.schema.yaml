# Prism Workspace Schema
# Defines the structure and constraints for workspace instances.

version: "1.0.0"

# Workspace instance directory structure
structure:
  required:
    - project.yaml
    - index.md
    - README.md
    - topics/
  optional:
    - docs/
    - archive/
    - AGENTS.md

# Symlink naming convention
symlink:
  pattern: "workspace.{code}.local"
  description: ".local suffix = personal, not committed to version control"

# Topic (专项) — the primary organizational unit
topic:
  naming: "{NNN}_{topic-name}/"
  numbering:
    digits: 3
    scope: "topics/ + archive/ 共享编号空间，全局递增"
  # 专项内部结构定义
  structure:
    required:
      - README.md           # 主线导航（编号/created/updated/status + 轮次索引）
    recommended:
      - intake.md           # 输入整形（混沌输入 → 结构化）
      - scope.md            # 合同收敛（目标/非目标/验收口径/约束/未决）
      - plan.md             # 总计划 + 当前焦点（单文件双区，跨轮次更新）
      - review.index.md     # 评审索引
    optional:
      - decision.index.md   # 决策索引
      - reviews/            # 评审轮次产物（rXX_short-desc.md）
      - "reviews/raw/"      # 原始角色报告（可选保留）
      - decisions/          # 决策记录（dXX_short-desc.md）
      - verify/             # 验证规格（plan 条目按需关联，[auto]/[human] 标记）
      - artifacts/          # 产出工件
      - snapshots/          # 历史快照（scope/plan 旧版本）

# Topic status lifecycle
topic_status:
  values: [in-progress, done]
  transitions:
    in-progress: [done]
    done: []

# Topic frontmatter schema (for topic root files: intake/scope/plan/review.index)
topic_frontmatter:
  required:
    date: "YYYY-MM-DD"
    status: "string"
    type: "string"
    tags: "list[string]"
  optional:
    related: "list[string]"

# Topic artifacts — 专项内工件分类
topic_artifacts:
  readme:
    filename: "README.md"
    template: "workspace/templates/topic-readme.md"
    description: "专项主线导航（属性表 + 控制台 + 当前状态 + 恢复指引 + 参考资料 + 关键决策）"
    producer: "workflow-intake / 手动"
  intake:
    filename: "intake.md"
    description: "输入整形 — 把混沌材料变成结构化输入"
    producer: "workflow-intake"
  scope:
    filename: "scope.md"
    description: "合同收敛 — 目标/非目标/验收口径/关键约束/未决问题（plan 唯一上游 SSOT）"
    producer: "workflow-scope / workflow-intake(初稿)"
  plan:
    filename: "plan.md"
    template: "workspace/templates/topic-plan.md"
    description: "总计划（工作分解 + 里程碑）+ 当前焦点（时间切片）— 由 scope.md 驱动更新，review 不直接修改"
    derive_spec: "skills/workflow/shared/plan-derive-spec.md"
    producer: "workflow-scope(派生)"
  review:
    filename_pattern: "reviews/rXX_short-desc.md"
    naming_rule: "rXX_{简短描述}.md — 中英文均可，禁止空格/子目录"
    description: "评审综合报告（一轮一个文件）"
    producer: "workflow-review"
  review_raw:
    filename_pattern: "reviews/raw/role-{X}.md"
    description: "原始角色评审报告（可选保留，默认不暴露）"
    producer: "workflow-review subagent"
  decision:
    filename_pattern: "decisions/dXX_short-desc.md"
    naming_rule: "dXX_{简短描述}.md — 中英文均可，禁止空格/子目录"
    description: "人类 accept/reject/route 裁决记录"
    producer: "手动 / review 后触发"
    template: |
      # dXX — {决策标题}
      date: {YYYY-MM-DD}
      trigger: {触发来源，如 r01 review / intake 路由 / 对话}
      status: accepted | rejected | deferred
      ## 决策
      {一句话结论}
      ## 上下文
      {做这个决策时的关键背景}
      ## 备选方案
      {考虑过但放弃的选项，简述理由}
      ## 影响
      {这个决策改变了什么：scope/plan/schema/skill}
      ## 后续动作
      - [ ] {需要执行的动作}
  review_index:
    filename: "review.index.md"
    description: "评审索引 — 哪轮做了什么，当前依据哪轮"
    producer: "workflow-review 自动追加"
  verify:
    filename_pattern: "verify/vXX_{short-desc}.md"
    naming_rule: "vXX_{简短描述}.md — 中英文均可，禁止空格"
    description: "验证规格 — 由 plan.md 条目按需关联，承载 scope 验收大项的具体判定标准"
    markers:
      auto: "[auto] — Agent 可独立执行验证，后跟命令 + 预期输出"
      human: "[human] — 需人工操作验收，后跟步骤 + 预期结果"
      plain: "无标记 — 纯判定标准文本"
    producer: "手动 / workflow-scope(派生)"
  decision_index:
    filename: "decision.index.md"
    description: "决策索引 — 人类裁决历史"
    producer: "手动"

# Archive rules
archive:
  trigger:
    status_done: true
    days_since_creation: 7
    active_topic_limit: 5
  structure: "archive/{NNN}_{topic-name}/"
  legacy: "archive/{YYYY-MM}/"
  topic_readme: "archive/{NNN}_{topic-name}/README.md"

# Constraints
constraints:
  doc_max_lines: 300
  max_active_topics: 10
  archive_after_days: 7
