# Prism Workspace — Project Metadata
# Location: Workspace/{PROJECT_CODE}/project.yaml

# ========== Required ==========

code: "{PROJECT_CODE}"
name: "{PROJECT_NAME}"

# Cross-device paths (device_id → local absolute path)
# device_id 来自 prism.local.yaml，由 hostname -s 自动生成
# bin/relink 链接成功后自动补写当前设备条目
paths:
  # {DEVICE_ID}: /path/to/project

# ========== Optional ==========

tech_stack: []

created: "YYYY-MM-DD"
status: active       # active | paused | archived

# 可选：归档与 index 自动化契约（默认 auto / anchored）
# archive_layout: flat           # archive/{NNN}_{name}/
# archive_layout: monthly_topic  # archive/YYYY-MM/topic/{NNN}_{name}/
# index_style: anchored          # prism:topics + ## 历史归档（默认）
# index_style: narrative         # ## 活跃专项 + ## 归档 分月表（TVKMM 等）
# index_style: manual            # 仅移目录，index 全手工

tags: []
related: []
