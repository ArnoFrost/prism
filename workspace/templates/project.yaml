# Prism Workspace — Project Metadata
# Location: Workspace/{PROJECT_CODE}/project.yaml

# ========== Required ==========

code: "{PROJECT_CODE}"
name: "{PROJECT_NAME}"

# Cross-device paths (device_id → local absolute path)
# device_id 来自 prism.local.yaml，由 hostname -s 自动生成
# bin/relink 链接成功后自动补写当前设备条目
paths:
  # {DEVICE_ID}: /path/to/project

# ========== Optional ==========

task_naming:
  format: "full"    # full | date | simple | custom
  # pattern: "{DATE}-{NNN}_{TAG}{NAME}.md"  # custom only
  # seq_digits: 3

tech_stack: []

created: "YYYY-MM-DD"
status: active       # active | paused | archived
tags: []
related: []

# Allowed tag subset (empty = all core tags)
# allowed_tags:
#   - 功能
#   - 修复
#   - 评审

# Task constraints
task_constraints:
  task_doc_max_lines: 300
  max_active_tasks: 15
  archive_after_days: 7
