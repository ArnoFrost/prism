# prism.local.yaml Schema
# 定义 prism.local.yaml 的结构约束，供 bin/setenv --validate 参考。
# 此文件本身不被脚本直接解析，作为人类可读的契约文档。

version: "1.1.0"

fields:
  device_id:
    type: string
    required: true
    description: "当前设备标识符，用于跨设备路径解析"
    example: "ARNOFROSTXU-MC1"
    default: "$(prism_short_hostname)"
    validation:
      - "由 setenv --init 自动从本机 hostname 推导生成，Windows 下会使用 fallback"
      - "可手动修改为自定义别名"
      - "用于 project.yaml paths 的设备键匹配"

  sdk_path:
    type: string
    required: true
    description: "Prism SDK 仓库的绝对路径"
    example: "/Users/xuxin/prism"
    validation:
      - "必须是绝对路径（以 / 开头）"
      - "目录必须存在"
      - "目录内应包含 bin/setenv（SDK 完整性校验）"

  skills_path:
    type: string
    required: false
    description: "外部 Skills 扩展仓库的绝对路径（独立 Git 仓库）；core contract 与 mini profile/package 均可不配置"
    example: "/Users/xuxin/prism-skills"
    validation:
      - "配置时必须是绝对路径"
      - "配置时目录建议存在"
      - "缺省时跳过外部技能分发，仅使用 SDK 内置 workflow/workspace 能力"

  vault_path:
    type: string
    required: true
    description: "iCloud Obsidian vault 基础路径（仅承载 Workspace）"
    example: "/Users/xuxin/Library/Mobile Documents/iCloud~md~obsidian/Documents/AI Obsidian"
    validation:
      - "必须是绝对路径"
      - "目录必须存在（iCloud 同步状态可能导致暂时不可达）"
      - "路径可含空格（iCloud 常见）"

  workspace_subdir:
    type: string
    required: true
    description: "Vault 内 Workspace 子目录（相对于 vault_path）"
    example: "Prism/Workspace"
    default: "Prism/Workspace"
    validation:
      - "相对路径，不以 / 开头"
      - "首次 relink 时自动创建"

  projects:
    type: map
    required: false
    description: "注册项目映射，key 为项目代号（大写），value 为本地路径"
    example:
      PRISM: "/Users/xuxin/prism"
      MYAPP: "/Users/xuxin/Projects/myapp"
    key_constraints:
      - "大写字母、数字、连字符、下划线"
      - "匹配 [A-Za-z0-9_-]+"
    value_constraints:
      - "绝对路径"
      - "目录必须存在"

conventions:
  - "此文件不入版本控制（已在 .gitignore 中排除）"
  - "由 bin/setenv --init 生成，bin/relink 读取"
  - "路径不使用 ~ 缩写，始终展开为绝对路径"
  - "YAML 顶层键用 snake_case"
  - "projects 段在文件末尾，便于追加"
  - "device_id 紧跟注释块后、sdk_path 之前"

multi_device:
  description: "跨设备支持机制"
  flow:
    - "每台设备的 prism.local.yaml 有唯一 device_id"
    - "Workspace 内 project.yaml 的 paths 以 device_id 为 key 存储各设备路径"
    - "bin/setenv --sync 读取 Workspace project.yaml，按 device_id 解析本设备路径"
    - "bin/relink 链接成功后，自动将 device_id → local_path 写回 project.yaml"
  paths_format:
    legacy: "list of strings（向后兼容，按路径是否存在逐个尝试）"
    current: "map of device_id → absolute_path"

tool_integration:
  setenv_init: "生成符合此 schema 的配置文件，自动写入 device_id"
  setenv_sync: "从 Workspace project.yaml 同步项目注册到本地 yaml"
  setenv_validate: "校验配置文件是否符合此 schema（必填字段 + 路径可达性 + 项目注册）"
  setenv_export: "读取配置并输出 shell export 语句"
  relink: "读取配置刷新所有软链接，成功后回写 project.yaml paths"

runtime:
  uv:
    required: true
    description: "core contract 的统一 Python 脚本运行时依赖，mini profile/package 继承该要求"
    setup_behavior:
      - "bin/setup --check 只检测并显式报错"
      - "bin/setup 正常初始化会尝试通过官方安装脚本自动安装"
      - "自动安装失败时提示用户手动安装"
